<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficosa Flow v3</title>
<style>
body{font-family:Arial;background:#eef2f5;padding:15px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
button,input,select{padding:10px;border-radius:10px;margin:4px}
.badge{background:#0b57d0;color:white;padding:6px 10px;border-radius:10px;display:inline-block}
</style>
</head>
<body>
<div class='card'>
<h2>🚚 Ficosa Flow 📦</h2>
<div>📅 Líneas activas esta semana:</div>
<div id='week'></div>
<button onclick='configWeek()'>⚙️ Configurar semana</button><br>
🏭 Línea:
<select id='line' onchange='render()'></select><br>
🎯 Objetivo <input id='goal' type='number'><br>
✅ Fabricadas <input id='done' type='number'><br>
<button onclick='updateData()'>Actualizar</button>
<h3 id='pending'></h3>
<div class='badge' id='counter'></div><br>
<button onclick='closeShift()'>🔒 Cerrar turno</button>
<button onclick='showHistory()'>📚 Historial</button>
</div>
<div class='card'><div id='refs'></div></div>
<script>
const allLines=["SE270","SE380 Robot","SE380 Manual","IVECO 5/6","STO CHASIS T-ROC1","SUBCJTO NISSAN PZ1D"];
let active=JSON.parse(localStorage.getItem('activeLines')||'["SE270","SE380 Robot","SE380 Manual"]');
let data=JSON.parse(localStorage.getItem('flowData')||'{}');
let history=JSON.parse(localStorage.getItem('history')||'[]');

function initLines(){
line.innerHTML="";
active.forEach(l=>line.innerHTML+=`<option>${l}</option>`);
week.innerHTML=active.map(x=>"🏭 "+x).join("<br>");
render();
}
function current(){
let l=line.value;
if(!data[l]) data[l]={goal:0,done:0,boxes:0};
return data[l];
}
function render(){
let c=current();
goal.value=c.goal;done.value=c.done;
pending.innerText="⏳ Pendientes: "+(c.goal-c.done);
counter.innerText="📦 Cajas introducidas: "+c.boxes;
refs.innerHTML="<button onclick='addBox()'>📦 +1 caja</button> <button onclick='removeBox()'>➖ -1 caja</button>";
save();
}
function addBox(){current().boxes++;render();}
function removeBox(){current().boxes=Math.max(0,current().boxes-1);render();}
function updateData(){let c=current();c.goal=+goal.value;c.done=+done.value;render();}
function configWeek(){
let txt=prompt("Escribe las líneas separadas por coma\n"+allLines.join(", "),active.join(", "));
if(txt){active=txt.split(",").map(x=>x.trim());localStorage.setItem('activeLines',JSON.stringify(active));initLines();}
}
function closeShift(){
history.push({date:new Date().toLocaleString(),line:line.value,boxes:current().boxes});
localStorage.setItem('history',JSON.stringify(history));
alert("Turno guardado en historial 📚");
}
function showHistory(){
alert(history.map(h=>h.date+" | "+h.line+" | 📦 "+h.boxes).join("\n")||"Sin historial");
}
function save(){localStorage.setItem('flowData',JSON.stringify(data));}
initLines();
</script>
</body></html>
