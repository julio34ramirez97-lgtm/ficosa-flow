<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficosa Flow v3</title>
<style>
body{font-family:Arial;background:#eef2f5;padding:15px}
.card{background:white;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
button,select,input{padding:8px;border-radius:8px;margin:4px}
button{background:#0b57d0;color:white;border:none}
.material{border-bottom:1px solid #ddd;padding:10px 0}
.small{color:#666;font-size:12px}
</style>
</head>
<body>
<div class="card">
<h2>Ficosa Flow v3</h2>
Línea:
<select id="line" onchange="loadLine()">
<option>SE270</option>
<option>SE380 Robot</option>
<option>SE380 Manual</option>
</select><br>
Objetivo <input id="goal" type="number"><br>
Fabricadas <input id="done" type="number">
<button onclick="saveData()">Actualizar</button>
<h3 id="pending"></h3>
<h3 id="totalBoxes"></h3>
<button onclick="finishTrip()">Viaje completado</button>
<button onclick="resetShift()">Reiniciar turno</button>
</div>

<div class="card">
<h3>Materiales</h3>
<div id="materials"></div>
</div>

<script>
const defaults={
"SE270":[
{name:"Motor Reg Luna IZQ MCI27",ref:"21992792",box:90,boxes:0},
{name:"Motor Reg Luna DER MCI2",ref:"21982721S",box:90,boxes:0},
{name:"Placa Portaluz",ref:"212834388",box:108,boxes:0},
{name:"Carcasa DER",ref:"212837802",box:28,boxes:0}
],
"SE380 Robot":[
{name:"Blink IZQ High",ref:"21992889D",box:91,boxes:0},
{name:"Motor Abatible IZQ",ref:"21982465",box:63,boxes:0},
{name:"Motor Abatible DER",ref:"21993264",box:90,boxes:0},
{name:"Carcasa IZQ",ref:"SP0006692",box:24,boxes:0},
{name:"Carcasa DER",ref:"SP0006693",box:24,boxes:0}
],
"SE380 Manual":[
{name:"Cable MEM SWA",ref:"SA0005918D",box:60,boxes:0},
{name:"Motor Abatible DER",ref:"21982466",box:63,boxes:0},
{name:"Carcasa IZQ",ref:"SP0006692",box:24,boxes:0},
{name:"Carcasa DER",ref:"SP0006693",box:24,boxes:0}
]
};

let data=JSON.parse(localStorage.getItem("ficosaflowv3")||"{}");

function getLine(){
 let l=line.value;
 if(!data[l]) data[l]={goal:300,done:0,materials:JSON.parse(JSON.stringify(defaults[l]))};
 return data[l];
}

function loadLine(){
 let d=getLine();
 goal.value=d.goal;
 done.value=d.done;
 renderMaterials();
 saveData();
}

function renderMaterials(){
 let d=getLine();
 let total=0,html="";
 d.materials.forEach((m,i)=>{
 total+=m.boxes;
 let units=m.boxes*m.box;
 html+=`<div class='material'><b>${m.name}</b><br>
 <span class='small'>Ref: ${m.ref}</span><br>
 📦 Cajas introducidas: ${m.boxes}<br>
 📦 Unidades disponibles: ${units}<br>
 📦 ${m.box} uds/caja<br>
 <button onclick='addBox(${i})'>+1 caja</button>
 <button onclick='removeBox(${i})'>-1 caja</button>
 </div>`;
 });
 materials.innerHTML=html;
 totalBoxes.innerText="Total cajas introducidas: "+total;
}

function addBox(i){getLine().materials[i].boxes++;save();}
function removeBox(i){getLine().materials[i].boxes=Math.max(0,getLine().materials[i].boxes-1);save();}
function saveData(){let d=getLine();d.goal=+goal.value;d.done=+done.value;pending.innerText="Pendientes: "+(d.goal-d.done)+" piezas";save();}
function save(){localStorage.setItem("ficosaflowv3",JSON.stringify(data));loadLine();}
function finishTrip(){alert("Viaje registrado para "+line.value);}
function resetShift(){if(confirm("¿Reiniciar esta línea?")){data[line.value]=undefined;loadLine();save();}}
loadLine();
</script>
</body>
</html>
