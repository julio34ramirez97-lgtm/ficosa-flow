<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficosa Flow v2</title>
<style>
body{font-family:Arial;background:#eef2f5;padding:15px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,select,button{padding:10px;border-radius:10px;border:1px solid #ccc;margin:4px}
button{background:#0b57d0;color:white;border:none}
.row{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
.small{font-size:12px;color:#666}
.badge{background:#0b57d0;color:white;padding:6px 10px;border-radius:10px;display:inline-block}
</style>
</head>
<body>
<div class='card'>
<h2>Ficosa Flow v2</h2>
<div>Línea:
<select id='line' onchange='changeLine()'>
<option>SE270</option><option>SE380 Manual</option><option>SE380X</option>
</select></div>
<div>Objetivo <input id='goal' type='number'></div>
<div>Fabricadas <input id='done' type='number'></div>
<button onclick='update()'>Actualizar</button>
<h3 id='pending'></h3>
<div class='badge' id='boxCounter'></div>
</div>
<div class='card'>
<h3>Material</h3>
<div id='refs'></div>
</div>
<script>
const templates={
"SE270":[
{name:"Motor Reg Luna IZQ",code:"21992792",box:90,stock:0,boxes:0},
{name:"Motor Reg Luna DER",code:"21982721S",box:90,stock:0,boxes:0},
{name:"Carcasa IZQ",code:"SP0006692",box:24,stock:0,boxes:0}],
"SE380 Manual":[
{name:"Material SE380 A",code:"SE380A",box:50,stock:0,boxes:0},
{name:"Material SE380 B",code:"SE380B",box:40,stock:0,boxes:0}],
"SE380X":[
{name:"Material X1",code:"X1",box:60,stock:0,boxes:0},
{name:"Material X2",code:"X2",box:30,stock:0,boxes:0}]
};
let data=JSON.parse(localStorage.getItem('ficosaflow')||'{}');
function current(){let l=line.value;if(!data[l]) data[l]={goal:300,done:0,refs:JSON.parse(JSON.stringify(templates[l]))}; return data[l];}
function render(){
let c=current();
goal.value=c.goal; done.value=c.done;
let total=0,h="";
c.refs.forEach((r,i)=>{total+=r.boxes;
h+=`<div class='row'><div><b>${r.name}</b><div class='small'>${r.code} · ${r.box} uds/caja</div><div>${r.stock} uds en línea · ${r.boxes} cajas</div></div>
<div><button onclick='addBox(${i})'>+1 caja</button><button onclick='removeBox(${i})'>-1 caja</button></div></div>`});
refs.innerHTML=h; boxCounter.innerText="Cajas añadidas hoy: "+total; update(false);
}
function addBox(i){let c=current(); c.refs[i].stock+=c.refs[i].box;c.refs[i].boxes++;save();}
function removeBox(i){let c=current(); c.refs[i].stock=Math.max(0,c.refs[i].stock-c.refs[i].box);c.refs[i].boxes=Math.max(0,c.refs[i].boxes-1);save();}
function update(store=true){let c=current(); c.goal=+goal.value;c.done=+done.value; pending.innerText="Pendientes: "+(c.goal-c.done)+" piezas"; if(store) save();}
function save(){localStorage.setItem('ficosaflow',JSON.stringify(data));render();}
function changeLine(){render();}
render();
</script>
</body></html>
